name: Ontario Parks Availability Checker

on:
  schedule:
    # Run every 3 hours between 8:00 AM ET and 10:00 PM ET (EDT: UTC-4)
    # 8:00 AM ET = 12:00 UTC
    # 11:00 AM ET = 15:00 UTC
    # 2:00 PM ET = 18:00 UTC
    # 5:00 PM ET = 21:00 UTC
    # 8:00 PM ET = 00:00 UTC
    - cron: '0 0,12,15,18,21 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-camping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ontario Parks Availability Checker
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python check_camping.py
